<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="sparkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer glow circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#sparkGradient)" stroke-width="2" opacity="0.3"/>
  
  <!-- Main circle background -->
  <circle cx="100" cy="100" r="85" fill="url(#sparkGradient)"/>
  
  <!-- Inner circle for depth -->
  <circle cx="100" cy="100" r="75" fill="#ffffff" opacity="0.95"/>
  
  <!-- Spark bolt - main lightning shape -->
  <g transform="translate(100, 100)">
    <!-- Central spark line -->
    <path d="M 0,-35 L -8,-5 L 0,0 L 8,25 L 0,35 L -5,8 L -25,15 L -8,5 L -15,-20 L 0,-8 L 15,-30 Z" 
          fill="url(#glowGradient)" 
          opacity="0.9"/>
    
    <!-- Lighter inner spark -->
    <path d="M -2,-32 L -6,-8 L -1,2 L 5,20 L 0,32 L -2,10 L -18,12 L -5,6 L -12,-18 L 2,-10 L 12,-25 Z" 
          fill="#ffffff" 
          opacity="0.6"/>
    
    <!-- Top spark point glow -->
    <circle cx="0" cy="-35" r="8" fill="#06b6d4" opacity="0.4" filter="url(#glow)"/>
    <circle cx="0" cy="-35" r="5" fill="#06b6d4" opacity="0.8"/>
    
    <!-- Secondary sparks for energy -->
    <circle cx="20" cy="-15" r="4" fill="#f59e0b" opacity="0.7"/>
    <circle cx="-20" cy="-10" r="4" fill="#06b6d4" opacity="0.7"/>
    <circle cx="15" cy="20" r="3" fill="#f59e0b" opacity="0.6"/>
    <circle cx="-15" cy="15" r="3" fill="#06b6d4" opacity="0.6"/>
  </g>
  
  <!-- Glow filter -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>